[logger]

log_level=0
active_tags=PackedStringArray()
ignored_tags=PackedStringArray()
available_tags=PackedStringArray("cache", "database", "error", "firebase", "local_data", "network")

[format]

show_timestamp=true
show_tags=true
use_colors=true
show_source=true

[setups]

test="{\"active_tags\":[],\"ignored_tags\":[]}"
"ignore cache"="{\"active_tags\":[],\"ignored_tags\":[\"cache\"]}"

[tag_setups]

default={
"active_tags": [],
"ignored_tags": []
}
debug_network={
"active_tags": ["network"],
"ignored_tags": []
}
test1={
"active_tags": Array[String](["cache"]),
"ignored_tags": Array[String]([])
}
cache+db={
"active_tags": Array[String](["cache", "database"]),
"ignored_tags": Array[String]([])
}
