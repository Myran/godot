[logger]

log_level=0
active_tags=Array[String]([])
ignored_tags=Array[String]([])
available_tags=Array[String](["cache", "database", "error", "firebase", "level:critical", "level:debug", "level:error", "level:info", "level:warning", "local_data", "network"])
enable_buffer_dump=true
buffer_size=20

[format]

show_timestamp=true
show_tags=true
use_colors=true
show_source=true
show_editor_debug=false

[setups]

test="{\"active_tags\":[],\"ignored_tags\":[]}"
"ignore cache"="{\"active_tags\":[],\"ignored_tags\":[\"cache\"]}"

[tag_setups]

default={
"active_tags": Array[String]([]),
"ignored_tags": Array[String]([])
}
test1={
"active_tags": Array[String](["local_data", "network"]),
"ignored_tags": Array[String](["cache"])
}

[meta]

version=1
