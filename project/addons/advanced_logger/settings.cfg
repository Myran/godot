[logger]

log_level=0
active_tags=Array[String]([])
ignored_tags=Array[String]([])
available_tags=Array[String](["active", "available", "cache", "database", "error", "firebase", "ignored", "level:critical", "level:debug", "level:error", "level:info", "level:warning", "local_data", "network"])

[format]

show_timestamp=true
show_tags=true
use_colors=true
show_source=true

[setups]

test="{\"active_tags\":[],\"ignored_tags\":[]}"
"ignore cache"="{\"active_tags\":[],\"ignored_tags\":[\"cache\"]}"

[tag_setups]

default={
"active_tags": Array[String]([]),
"ignored_tags": Array[String]([])
}
test1={
"active_tags": Array[String](["local_data", "network"]),
"ignored_tags": Array[String](["cache"])
}
test2={
"active_tags": Array[String](["local_data", "network"]),
"ignored_tags": Array[String](["cache", "firebase"])
}
test={
"active_tags": Array[String](["level:debug"]),
"ignored_tags": Array[String]([])
}
"ignore caches"={
"active_tags": Array[String](["local_data"]),
"ignored_tags": Array[String](["cache"])
}

[meta]

version=1
